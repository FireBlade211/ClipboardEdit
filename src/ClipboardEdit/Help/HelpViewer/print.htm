<h1>To print the current help topic</h1>

<p><img src="onestep.gif" border=0>&nbsp;Right-click a topic, and then click <b>Print</b>.</p>

<b>Note</b>
<ul>
<li>If you print from the <b>Contents</b> tab (by right-clicking an entry, and then clicking <b>Print</b>) you will see options to print only the current topic, or the current topic and all subtopics.
</li>
</ul>
<p><OBJECT id=hhctrl type="application/x-oleobject"
        classid="clsid:adb880a6-d8ff-11cf-9377-00aa003b7a11"
        width=100
        height=100
>
