<h1>To change the font size of a topic</h1>

<p><img src="onestep.gif" border=0>&nbsp;On the <b>Options</b> menu, click <b>Internet Options</b>, and then click <b>Fonts</b>.
</p>
<b>Notes</b>
<ul>
<li>These changes do not apply to the Navigation pane or toolbar of the Help Viewer.
<li>This will also change your font settings for Internet Explorer.
</li>
</ul>
<p>
