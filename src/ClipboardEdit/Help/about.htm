<H1>What is ClipboardEdit?</H1>
<P>ClipboardEdit is a utility that allows you to view and edit the clipboard. It also allows you to manipulate clipboard formats and save snapshots of your clipboard, as well as view in-app documentation for different structures that may be stored in those formats.</P>
